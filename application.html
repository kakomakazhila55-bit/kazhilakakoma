<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>applicationform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">  Job Application form</h1>
        <form action="connect.php " method="post">
            <!--personal details-->
            <!--short container for personnal information-->
            <div class="form-group">
                <label name="fullname" class="required">fullname</label>
                <input type="text" id="fullname" name="fullname" placeholder="enter your fullname" required>
            </div>
            <br>
            <!--for personnal email-->
            <div class="form-group">
                <label for="email" class="required">email address</label>
                <input type="email" id="email" name="email" placeholder="e.g name@email.com" required>
            </div> <br>
            <!-- pernnal number-->
            <div class="form-group">
                  <label for="tel" class="required">phonenumber</label>
                  <input type="tel" id="phone" name="phone" placeholder="(123) 789-234" required>
            </div> <br>
            <!--position of the job applying for now -->
            <div class="form-group">
                <label for="position" class="'required">position applied for</label>
                <select id="position" name="position" required>
                    <option value=" ">select position</option>
                    <option value="software engineer">software engineering</option>
                    <option value="human resource manager">human resource manager</option>
                    <option value="business administrator"> business administrator</option>
                    <option value="system analyst">system analyst</option>
                    <option value="mechanical engineer">mechanical engineer</option>
                </select>
            </div>
            <br>
            <!--the agree for the application -->
            <div class="form-group">
                <label>
                    <input type="checkbox" name="agree" value="yes" required> I confirm that the information is provided is true and accurate</input>
                </label>
            </div>
            <!--the submittion button -->
            <button type="submit"><span>submit</span></button>
        
  
        </form>


    </div>
    
</body>
</html>
